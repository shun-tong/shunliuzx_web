<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一个网站</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, "Microsoft YaHei", sans-serif;
            background: #f5f5f5;
            color: #222;
        }

        header {
            background: #222;
            color: white;
            padding: 30px;
            text-align: center;
        }

        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        h1 {
            margin: 0;
        }

        h2 {
            color: #333;
        }

        p {
            line-height: 1.8;
        }

        button {
            background: #ff6600;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #e65c00;
        }

        footer {
            text-align: center;
            color: #666;
            padding: 30px;
        }
    </style>
</head>

<body>
    <header>
        <h1>我的第一个网站</h1>
        <p>使用 GitHub + Cloudflare Pages 部署</p>
    </header>

    <main>
        <div class="card">
            <h2>网站测试成功</h2>
            <p>
                如果你能看到这个页面，说明 HTML 文件已经成功部署到 Cloudflare Pages。
            </p>
        </div>

        <div class="card">
            <h2>关于这个网站</h2>
            <p>
                这是一个简单的测试页面。之后你可以继续添加图片、导航栏、个人介绍、项目展示等内容。
            </p>
        </div>

        <div class="card">
            <h2>测试按钮</h2>
            <p>点击下面的按钮，可以测试 JavaScript 是否正常运行。</p>
            <button onclick="showMessage()">点击测试</button>
        </div>
    </main>

    <footer>
        <p>© 2026 My Website</p>
    </footer>

    <script>
        function showMessage() {
            alert("JavaScript 运行成功！");
        }
    </script>
</body>
</html>
